name: Cache x86 Windows

on:
    workflow_call:
        inputs:
            build_type:
                required: true
                type: string

jobs:
    windows-32-bit-build:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v5
              with:
                submodules: recursive
                ref: master

            - name: Set up Visual Studio shell
              uses: egor-tensin/vs-shell@v2
              with:
                arch: x86

            - name: Cache Windows vcpkg
              id: cache-vcpkg
              uses: actions/cache@v4
              with: 
                path: ${{github.workspace}}/build/vcpkg_installed
                key: ${{runner.os}}-32-vcpkg-${{hashfiles('neo/windows-32-bit-status')}}
                restore-keys: |
                    ${{ runner.OS }}-32-vcpkg-
                enableCrossOsArchive: true

            - if: ${{ steps.cache-vcpkg.outputs.cache-hit != 'true' }}
              name: Configure CMake
              working-directory: ${{github.workspace}}/neo
              shell: powershell
              run: cmake -B ${{github.workspace}}/build --preset=windows-x86-2026
            
            - name: Save logs - VCPKG
              if: ${{ failure() }}
              uses: actions/upload-artifact@v4
              with:
                  name: vcpkg-windows-32-logs
                  path: ${{github.workspace}}/vcpkg/buildtrees/*/*.log